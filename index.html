<!DOCTYPE html>
<html>
<head>
  <title>DISPOSSIBLE Presale</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
  <script src="config.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <img src="https://raw.githubusercontent.com/dispossibleonsol/dispossible-assets/main/DISPOSSIBLE_MASTER_1024.png" alt="DISPOSSIBLE Logo" width="120">
    <h1>DISPOSSIBLE Presale</h1>
  </header>

  <section id="wallet-section">
    <button onclick="connectWallet()">Connect Wallet</button>
    <p id="status"></p>
  </section>

  <section id="presale-section">
    <h2>Buy Tokens</h2>
    <button onclick="buyTokens()">Buy Tokens</button>
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
    <ul id="buyer-list"></ul>
  </section>
</body>
</html>
