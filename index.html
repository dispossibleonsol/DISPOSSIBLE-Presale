<!DOCTYPE html>
<html>
<head>
  <title>DISPOSSIBLE Presale</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="app.js" defer></script>
</head>

<body>

<div class="overlay">

  <header>
    <img src="https://raw.githubusercontent.com/dispossibleonsol/dispossible-assets/main/DISPOSSIBLE_MASTER_1024.png" class="logo">
    <h1>DISPOSSIBLE</h1>
    <p class="tagline">Impossible? I don’t think so.</p>
  </header>

  <div class="card">

    <h2>🔥 PRESALE LIVE 🔥</h2>

    <p id="timer">Loading timer...</p>

    <div class="stats">
      <p><b>Price:</b> 1 SOL = 1,000,000 DSP</p>
      <p><b>Total Supply:</b> 1,000,000,000</p>
      <p id="raised">0 SOL raised</p>
    </div>

    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>

    <button class="buy-btn" onclick="buyTokens()">🚀 BUY NOW</button>

    <ul id="buyer-list"></ul>

  </div>

</div>

</body>
</html>
